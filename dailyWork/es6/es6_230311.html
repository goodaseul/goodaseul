<head>

<body>
    <button id="btn">
        버튼
    </button>
    <script>
        let object = {
            name: ['김', '정', '이'],
            함수: function () {
                console.log(this)
                object.name.forEach(() => {
                    console.log(this);
                })
            }
        }
        object.함수();

        let person = {
            name: '정다슬',
            sayHi() {
                console.log(`안녕 나는 ${this.name}`)
            }
        }
        person.sayHi();

        var object02 = {
            data: [1, 2, 3, 4, 5],
        }
        let sum = 0;
        object02.data.forEach(item => {
            sum += item;
        })
        console.log(sum);

        document.getElementById('btn').addEventListener("click", function () {
            let value = this.innerHTML;
            setTimeout(() => {
                console.log(value)
            }, 1000);
        })
    </script>
