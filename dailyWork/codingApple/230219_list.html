            { id: 2, price: 60000, title: 'Black Monastery' }
        ];
        //h5에 title넣고/ p에 가격 넣기
        let cardTitle = document.querySelectorAll('.card-body h5');
        let cardPrice = document.querySelectorAll('.card-body p');

        for (i = 0; i < cardTitle.length; i++) {

            cardTitle[i].innerHTML = products[i].title;

        let pants = [28, 30, 32, 35, 40];

        result.addEventListener("input", function () {
            let form2 = document.querySelector('.form-select-2')

            if (result.value == 'shirt') {
                console.log(1)
                form2.classList.remove('hide')

                pants.forEach(function (pant) {

            } else {

            }
