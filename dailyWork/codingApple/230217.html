    <script>
        let age = 27;

        let money = 60000;
        let fMoney = 0;
        function moneyCalc(money) {
            if (money < 50000) {
                fMoney = (money * 1.15 ** 2);
            } else if (money >= 50000) {
                fMoney = (money * 1.2 ** 2);
            }
            return console.log(Math.floor(fMoney))
        }
        moneyCalc(money);

        let first = 360;
        let total = 0;
        refill(first);
        function refill(first) {
            let firstVolume = first;
            let againTwice = first - (first / 3); //240
            let againThird = againTwice - (againTwice / 3);
            total = firstVolume + againTwice + againThird;
            return console.log(total);
        }

        let sendAnswer = document.querySelector("#send-answer");
        let count = 0;
        sendAnswer.addEventListener("click", function () {

            if (qVal == 1335) {
                alert('성공')
            }
            else {

                }

        })
