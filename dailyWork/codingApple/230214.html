<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>230214/6~11</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link rel="stylesheet" href="main.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script> 
    </head>
    <body>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
          <span class="navbar-brand">Navbar</span>
          <button class="navbar-toggler" type="button">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
    </nav> 
    <ul class="list-group">
        <li class="list-group-item">An item</li>
        <li class="list-group-item">A second item</li>
        <li class="list-group-item">A third item</li>
        <li class="list-group-item">A fourth item</li>
        <li class="list-group-item">And a fifth one</li>
    </ul> 
    <button class="login">로그인</button>
    <div class="modal-ex">
        <form action="success.html">
            <!--서버로 유저정보 전송함 action-->
            <div class="my-3">
                <input type="text" class="form-control">
            </div>
            <div class="my-3">
                <input type="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">전송</button>
            <button type="button" class="btn btn-danger" id="close">닫기</button>
        </form>         
    </div>
    <script>
        // 전송 버튼 누르면 저기 input 입력값이 공백이면 알림창띄워주세요.
        document.querySelector("form").addEventListener("submit", function(e){
            //addEventListener("input") input 을 작성할 때 > 실시간으로 비번 더 길게써라 할 수 있음
            //addEventListener("change") change 을 작성할 때 > input 박스에 value 쓰고 커서를 다른 곳에 누를 때
            let input = document.querySelectorAll('.my-3 input');
            console.log(input);
            if( (input[0].value == "" || input[0].value == " ") || (input[1].value == "" || input[1].value == " ")){
                alert('야 ! 공백말고 input 값 입력해')
                e.preventDefault();
            }
            if( input[1].value.length < 6){
                alert('비번 길게 써!!! ')
                e.preventDefault();
            }
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script>
        document.querySelector(".navbar-toggler").addEventListener("click", function(){
          document.querySelector('.list-group').classList.toggle("show");
        })
        document.querySelector(".btn-danger").addEventListener("click",function(){
          document.querySelector(".modal-ex").classList.remove('show-modal');
        })
        document.querySelector(".login").addEventListener("click", function(){
          document.querySelector(".modal-ex").classList.add('show-modal');
        })
    </script>
    </body>
</html>
