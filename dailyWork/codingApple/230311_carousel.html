<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>230311/step3/carousel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
        integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <div style="overflow:hidden;">
        <div class="slide-container">
            <div class="slide-box">
                <img src="images/car1.png" alt="">
            </div>
            <div class="slide-box">
                <img src="images/car2.png" alt="">
            </div>
            <div class="slide-box">
                <img src="images/car3.png" alt="">
            </div>
        </div>
    </div>
    <button class="slide-btn slide-btn-1">1</button>
    <button class="slide-btn slide-btn-2">2</button>
    <button class="slide-btn slide-btn-3">3</button>

    <button class="info info-prev">prev</button>
    <button class="info info-next">next</button>

    <script>
        let start = 0;
        $(".slide-box").eq(0).on("mousedown", function (e) {
            start = e.clientX
            // e.clientX
        })
        $(".slide-box").eq(0).on("mousemove", function (e) {
            console.log(e.clientX - start)
            // e.clientX
            $(".slide-container").css(
                'transform', `translateX(${e.clientX - start})`
            )
        })
        let slideContainer = document.querySelector(".slide-container");
        let slideBox = document.querySelectorAll(".slide-box");
        let count = 1;
        let countPrev = slideBox.length;
        let btn = document.querySelectorAll(".slide-btn");
        let infoBtn = document.querySelectorAll('.info');
        btn[0].addEventListener("click", function () {
            slideContainer.style.transform = 'translateX(0)';
        })
        btn[1].addEventListener("click", function () {
            slideContainer.style.transform = 'translateX(-100vw)';
        })
        btn[2].addEventListener("click", function () {
            slideContainer.style.transform = 'translateX(-200vw)';
        })
        infoBtn[0].addEventListener("click", function () {
            slideContainer.style.transform = 'translateX(-' + count * (countPrev - 1) + '00vw)';
            console.log(slideContainer.style.transform = 'translateX( -' + count * (countPrev - 1) + '00vw)')
            count++;
            // if (count < 0) {
            //     count = slideBox.length - 1;
            // }
        })
        infoBtn[1].addEventListener("click", function () {
            slideContainer.style.transform = `translateX(${-count}00vw)`;
            console.log(slideContainer.style.transform = `translateX(${-count}00vw)`)
            count++;
            if (count >= slideBox.length) {
                count = 0;
            }
        })
    </script>
</body>

</html>
