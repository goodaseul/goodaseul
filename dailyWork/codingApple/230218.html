<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>230218/step2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"
        integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <div class="now-per"></div>
    <button class="login">로그인</button>
    <div class="modal-ex">
        <form action="success.html">
            <!--서버로 유저정보 전송함 action-->
            <div class="my-3">
                <input type="text" class="form-control">
            </div>
            <div class="my-3">
                <input type="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">전송</button>
            <button type="button" class="btn btn-danger" id="close">닫기</button>
        </form>
    </div>
    <div class="wrap-cont">
        <div class="wrap-nav">
            <nav class="navbar navbar-light bg-light">
                <div class="container-fluid">
                    <span class="navbar-brand">Navbar</span>
                    <button class="navbar-toggler" type="button">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </div>
            </nav>
        </div>
        <div class="lorem" style=" width: 200px; height: 100px; overflow-y: scroll;">Lorem ipsum dolor sit amet
            consectetur
            adipisicing
            elit. Quibusdam, molestiae? Temporibus vitae asperiores ex nostrum repudiandae magni quia similique.
            Adipisci
            quae impedit in autem molestiae incidunt quas eligendi ipsam laborum?</div>
        <div style="height: 2000px;"></div>
    </div>
    <script>

        window.addEventListener("scroll", function () {
            let currentPer = (window.scrollY / (document.querySelector('body').clientHeight - window.innerHeight)) * 100
            console.log(currentPer, window.scrollY, document.querySelector('body').clientHeight, window.innerHeight);
            document.querySelector('.now-per').style.width = currentPer + '%';
        })

        window.addEventListener("scroll", function () {
            // $(window).scrollTop() == window.scrollY
            if (window.scrollY > 10) {
                document.querySelector(".navbar-brand").classList.add("active");
            } else {
                document.querySelector(".navbar-brand").classList.remove("active");
            }
        })
        let lorem = document.querySelector('.lorem');
        lorem.addEventListener("scroll", function () {
            console.log(lorem.scrollTop + lorem.clientHeight, lorem.scrollHeight);
            if (lorem.scrollTop + lorem.clientHeight >= lorem.scrollHeight) {
                alert('약관 다 읽음');
            }
        })
        //1초에 1000ms
        function changeMs(m, s) {
            let minute = m * 60;
            let seconds = s;

            return (minute + seconds) * 1000;
        }
        console.log(changeMs(2, 10))

        function discount(price, first) {
            let prices = price;
            let firsts = first;

            let sum = (prices - (prices * 0.1)).toFixed();
            if (firsts == true) {
                sum -= (prices * 0.15)
                // return parseInt(sum)
            }
            return parseInt(sum);
        }

        console.log(discount(70, false));
        console.log(discount(10, true));

        document.querySelector(".btn-danger").addEventListener("click", function () {
            document.querySelector(".modal-ex").classList.remove('show-modal');
        })
        document.querySelector(".login").addEventListener("click", function () {
            document.querySelector(".modal-ex").classList.add('show-modal');
        })

        document.querySelector(".modal-ex").addEventListener("click", (e) => {
            /*
            e.target; //유저가 실제 누른거
            e.currentTarget; // == this //이벤트 리스너 달린 곳 ~^^
            e.preventDefault(); // 이벤트 기본동작 막아줌
            e.stopPropagation(); // 상위요소로 이벤트 버블링 막아줌
            */
            if (e.target == document.querySelector(".modal-ex")) {
                document.querySelector(".modal-ex").classList.remove('show-modal');
            }
        })

    </script>
</body>

</html>
