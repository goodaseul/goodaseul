<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>

<body>
    <div class="card-background">
        <div class="card-box">
            <img src="/dailyWork/codingApple/images/card1.png" alt="">
        </div>
        <div class="card-box">
            <img src="/dailyWork/codingApple/images/card2.png" alt="">
        </div>
        <div class="card-box">
            <img src="/dailyWork/codingApple/images/card3.png" alt="">
        </div>
    </div>
    <script>
        $(window).scroll(function () {
            let st = $(window).scrollTop();

            console.log(st);
            let cardBox = $(".card-box");
            let a = -1 / 500;
            let b = 115 / 50;
            // 1 = a*650 +b;
            let y = a * st + b;

            let z = (-1 / 5000) * st + 565 / 500;

            cardBox.eq(0).css('opacity', y)
            cardBox.eq(0).css('transform', 'scale(' + z + ')')
        })
    </script>
</body>

</html>
