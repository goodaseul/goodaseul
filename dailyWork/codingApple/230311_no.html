<body>
    <div class="container">

    </div>
    <script>
        let elem;
        let products = [
            { id: 0, price: 70000, title: 'Blossom Dress' },
            { id: 1, price: 50000, title: 'Springfield Shirt' },
            { id: 2, price: 60000, title: 'Black Monastery' }
        ]
        common(products, elem)

        function common(items, tag) {
            items.forEach((item, index) => {
                tag = `<div class="col-sm-4">
                    <img src="https://via.placeholder.com/600" class="w-100">
                    <h5>${item.title}</h5>
                    <p>가격 : ${item.price}</p>
                    <button class="buy">구매</button>
                </div> `;
                document.querySelector('.row').insertAdjacentHTML('beforeend', tag);
            })
        }

        let arr = [];
        let counter = 0;
        $(".buy").click(function (e) {
            // counter++;
            let content = $(e.target).siblings('h5').text();
            let plusValue = { content: content, counter: counter }
            arr.push(plusValue);
            let newArr = JSON.stringify(arr);

            localStorage.setItem('구매목록', newArr);


            let getStorage = localStorage.getItem('구매목록');
            getStorage = JSON.parse(getStorage);

            getStorage.forEach((item, index) => {
                console.log(item.counter)
                if (item.counter > 1) {
                    localStorage.setItem('구매목록', getStorage);
                } else {
                    localStorage.setItem('구매목록', [newArr]);
                }
            })
        })

    </script>
</body>
