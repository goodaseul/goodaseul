    <script>
        //#str
        var string = "분양안내";
        var str = string.split("");
        var el = document.getElementById('str');
        (function animate() {
            str.length > 0 ? el.innerHTML += str.shift() : clearTimeout(running);
            var running = setTimeout(animate, 200);
        })();


        String.prototype.replaceAll = function (search, replacement) {
            var target = this;
            return target.replace(new RegExp(search, 'g'), replacement);
        };

        jQuery(document).ready(function () {

            jQuery('.wm-text[class*="domino-"] div').each(function (index) {
                var characters = this.innerHTML.split("");
                _this = this;
                newHTML = "";
                jQuery.each(characters, function (i, el) {
                    if (el === " ") {
                        newHTML += '<span style="display:inline;"> </span>';
                    } else {
                        newHTML += "<span><span>" + el + "</span></span>";
                    }
                    if (i === characters.length - 1) {
                        _this.innerHTML = newHTML;
                    }
                });
            });

            jQuery('.wm-text[class*="line-"] div').each(function (index) {
                newHTML = "<div>" + this.innerHTML + "</div>";
                this.innerHTML = newHTML;
            });

            // jQuery(this.id).toggleClass("on-screen");
